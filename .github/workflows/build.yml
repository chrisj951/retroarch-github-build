name: Build RetroArch

on:
  workflow_dispatch:
    inputs:
      retroarch_version:
        description: 'RetroArch version tag'
        default: 'v1.22.2'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create beta release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          TAG="beta-${BRANCH}"
          # Delete existing release/tag if present
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" \
            --target "$BRANCH" \
            --title "Beta - ${BRANCH}" \
            --notes "RetroArch ${{ github.event.inputs.retroarch_version || 'v1.22.2' }} built from \`${BRANCH}\`" \
            --prerelease

      - name: Detect build target
        id: target
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [ "$BRANCH" = "a30" ]; then
            echo "platform=a30" >> "$GITHUB_OUTPUT"
          else
            echo "platform=aarch64" >> "$GITHUB_OUTPUT"
          fi

      # --- aarch64 build ---
      - name: Build Docker image (aarch64)
        if: steps.target.outputs.platform == 'aarch64'
        run: docker build -t ra-builder .

      - name: Build RetroArch (aarch64)
        if: steps.target.outputs.platform == 'aarch64'
        run: |
          mkdir -p output
          docker run --rm \
            -e RETROARCH_VERSION=${{ github.event.inputs.retroarch_version || 'v1.22.2' }} \
            -v ${{ github.workspace }}/output:/output \
            ra-builder

      - name: Upload aarch64 binary
        if: steps.target.outputs.platform == 'aarch64'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv output/retroarch output/ra64.universal
          TAG="beta-${GITHUB_REF_NAME}"
          gh release upload "$TAG" output/ra64.universal --clobber

      # --- A30 build ---
      - name: Download A30 toolchain
        if: steps.target.outputs.platform == 'a30'
        run: |
          wget -q -O a30_toolchain-v1.0.tar.gz \
            "https://github.com/steward-fu/website/releases/download/miyoo-a30/a30_toolchain-v1.0.tar.gz"

      - name: Build Docker image (A30)
        if: steps.target.outputs.platform == 'a30'
        run: docker build -f Dockerfile.a30 -t ra-builder-a30 .

      - name: Build RetroArch (A30)
        if: steps.target.outputs.platform == 'a30'
        run: |
          mkdir -p output
          docker run --rm \
            -e RETROARCH_VERSION=${{ github.event.inputs.retroarch_version || 'v1.22.2' }} \
            -v ${{ github.workspace }}/output:/output \
            ra-builder-a30

      - name: Upload A30 binary
        if: steps.target.outputs.platform == 'a30'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv output/retroarch output/RA32.A30
          TAG="beta-${GITHUB_REF_NAME}"
          gh release upload "$TAG" output/RA32.A30 --clobber
